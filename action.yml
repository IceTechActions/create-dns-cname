name: Create DNS CNAME Record
description: >
  Create a CNAME record in the cust.nisportal.com zone pointing to the Front Door
  endpoint hostname, and create the _dnsauth TXT record required for AFD
  custom domain validation. Requires an active Azure CLI session.

inputs:
  feature_name:
    description: Feature environment name (e.g. feature-1234)
    required: true
  fd_hostname:
    description: Front Door endpoint hostname (without https://) — from deploy-feature outputs
    required: true
  dns_zone_resource_group:
    description: Resource group containing the cust.nisportal.com DNS zone
    required: true
  resource_group:
    description: Resource group containing the Front Door profile
    required: true
  front_door_name:
    description: Name of the shared Azure Front Door profile
    required: false
    default: 'fd-nisportal'
  dns_zone_name:
    description: DNS zone name used to construct the custom domain resource name
    required: false
    default: 'cust.nisportal.com'
  cert_wait_timeout:
    description: Seconds to wait for cert (0 = skip wait)
    required: false
    default: '1800'

runs:
  using: composite
  steps:
    - name: Create DNS records
      shell: bash
      env:
        FEATURE_NAME: ${{ inputs.feature_name }}
        FD_HOSTNAME: ${{ inputs.fd_hostname }}
        DNS_ZONE_RG: ${{ inputs.dns_zone_resource_group }}
        RESOURCE_GROUP: ${{ inputs.resource_group }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "${{ github.action_path }}/scripts/create-dns-records.sh"

    - name: Wait for AFD custom domain certificate
      if: inputs.cert_wait_timeout != '0'
      shell: bash
      run: |
        FEATURE="${{ inputs.feature_name }}"
        RG="${{ inputs.resource_group }}"
        FD="${{ inputs.front_door_name }}"
        DNS_ZONE="${{ inputs.dns_zone_name }}"
        CUSTOM_DOMAIN_NAME=$(echo "${FEATURE}-${DNS_ZONE}" | sed 's/\./-/g')
        TIMEOUT=${{ inputs.cert_wait_timeout }}
        ELAPSED=0
        echo "Waiting for AFD custom domain '${CUSTOM_DOMAIN_NAME}' cert (timeout: ${TIMEOUT}s)..."
        while [ $ELAPSED -lt $TIMEOUT ]; do
          RESULT=$(az afd custom-domain show \
            --profile-name "$FD" \
            --resource-group "$RG" \
            --custom-domain-name "$CUSTOM_DOMAIN_NAME" \
            --query '{validationState:domainValidationState,provisioningState:provisioningState}' \
            -o json 2>/dev/null || echo '{}')
          VS=$(echo "$RESULT" | jq -r '.validationState // "Unknown"')
          PS=$(echo "$RESULT" | jq -r '.provisioningState // "Unknown"')
          echo "  domainValidationState=$VS  provisioningState=$PS  (${ELAPSED}s elapsed)"
          if [ "$VS" = "Approved" ] && [ "$PS" = "Succeeded" ]; then
            echo "Custom domain certificate is ready."
            exit 0
          fi
          sleep 30
          ELAPSED=$((ELAPSED + 30))
        done
        echo "::warning::AFD cert did not reach Approved/Succeeded within ${TIMEOUT}s"
